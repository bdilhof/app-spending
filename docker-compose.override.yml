services:
  app:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    image: ghcr.io/bdilhof/app-manna:${APP_VERSION}
    environment:
      APP_ENV: local
      APP_DEBUG: true
      APP_URL: http://localhost:8000
      APP_PORT: 8000
      FORWARD_DB_PORT: 3307
    volumes:
      - .:/var/www/html
    extra_hosts:
      - "host.docker.internal:host-gateway"
