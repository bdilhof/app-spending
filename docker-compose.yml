services:
  app:
    image: ghcr.io/bdilhof/app-manna:${APP_VERSION}
    container_name: app
    restart: unless-stopped
    environment:
      APP_KEY: base64:TcSKylIt9ANiSysD0Kw1llQQEHMgWqgAZZDQOJYjEc4=
      APP_ENV: production
      APP_DEBUG: false
      APP_URL: http://localhost:8000
      APP_PORT: 8000
      APP_FALLBACK_LOCALE: en
      APP_FAKER_LOCALE: en_US
      APP_MAINTENANCE_DRIVER: file
      BCRYPT_ROUNDS: 12
      LOG_CHANNEL: stack
      LOG_STACK: single
      LOG_DEPRECATIONS_CHANNEL: null
      LOG_LEVEL: debug
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: manna
      DB_USERNAME: manna
      DB_PASSWORD: password
      FORWARD_DB_PORT: 3307
      SESSION_DRIVER: database
      SESSION_LIFETIME: 120
      SESSION_ENCRYPT: false
      SESSION_PATH: /
      SESSION_DOMAIN: null
      BROADCAST_CONNECTION: log
      FILESYSTEM_DISK: local
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      REDIS_CLIENT: phpredis
      REDIS_HOST: 127.0.0.1
      REDIS_PASSWORD: null
      REDIS_PORT: 6379
      VITE_APP_NAME: Manna
    networks:
      - app-network

  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network
    depends_on:
      - app
    ports:
      - "8000:80"

  db:
    image: mysql:8.0
    command: --skip-log-bin
    container_name: db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: manna
      MYSQL_USER: manna
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - app-network
    ports:
      - "${FORWARD_DB_PORT:-3306}:3306"

  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  dbdata:
